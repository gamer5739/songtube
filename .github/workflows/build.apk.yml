name: Build Android APK from ZIP (Android 5 Support)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract Project ZIP
        run: |
          unzip -q SongTube-App-7.3.2-5200.zip -d extracted_project
          if [ -d "extracted_project/songtube" ]; then
            mv extracted_project/songtube/* . || true
            mv extracted_project/songtube/.* . || true
          else
            mv extracted_project/* . || true
            mv extracted_project/.* . || true
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: SongTube-Lollipop-APKs
          path: build/app/outputs/flutter-apk/*.apk
