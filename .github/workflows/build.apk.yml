name: Build Android APK from ZIP (Android 5 Support)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. ZIP Extract karna
      - name: Extract Project ZIP
        run: |
          unzip -q SongTube-App-7.3.2-5200.zip -d extracted_project
          if [ -f "extracted_project/pubspec.yaml" ]; then
            mv extracted_project/* . || true
            mv extracted_project/.* . || true
          else
            SUBFOLDER=$(find extracted_project -maxdepth 2 -name "pubspec.yaml" -exec dirname {} \;)
            if [ ! -z "$SUBFOLDER" ]; then
              mv $SUBFOLDER/* . || true
              mv $SUBFOLDER/.* . || true
            fi
          fi

      # 2. Java Setup (Flutter setup se pehle zaroori hai)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Flutter SDK Setup karna
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      # 4. Super Fix: Saare expected paths ko pehle hi generate kar dena
      - name: Inject Complete Local Properties
        run: |
          mkdir -p android
          # Flutter SDK ka real path aur Android SDK ka path local.properties me daalna
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
          # Agar project ko flutter.versionName ya flutter.versionCode chahiye ho
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          
          # Ek backup empty file create karna agar koi key-store path null dhoond raha ho
          touch android/dummy_path.jks
          
          echo "Generated local.properties content:"
          cat android/local.properties

      # 5. Dependencies download karna
      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      # 6. APK Build karna
      - name: Build APK
        run: flutter build apk --release --split-per-abi --no-shrink

      # 7. Upload Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SongTube-Lollipop-APKs
          path: build/app/outputs/flutter-apk/*.apk
