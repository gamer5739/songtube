name: Build Android APK from ZIP (Android 5 Support)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Smart Extract: Jo khud dhundega ki files kaha hain aur unhe bahar nikalega
      - name: Extract Project ZIP
        run: |
          unzip -q SongTube-App-7.3.2-5200.zip -d extracted_project
          
          # Agar zip ke andar direct files hain
          if [ -f "extracted_project/pubspec.yaml" ]; then
            echo "Files found in root of extracted folder!"
            mv extracted_project/* . || true
            mv extracted_project/.* . || true
          
          # Agar zip ke andar kisi sub-folder mein files hain (Jaise SongTube-App-7.3.2-5200/...)
          else
            SUBFOLDER=$(find extracted_project -maxdepth 2 -name "pubspec.yaml" -exec dirname {} \;)
            if [ ! -z "$SUBFOLDER" ]; then
              echo "Files found in subfolder: $SUBFOLDER"
              mv $SUBFOLDER/* . || true
              mv $SUBFOLDER/.* . || true
            else
              echo "ERROR: pubspec.yaml not found anywhere in the ZIP!"
              exit 1
            fi
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SongTube-Lollipop-APKs
          path: build/app/outputs/flutter-apk/*.apk
