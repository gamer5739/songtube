name: Build Android APK from ZIP (Android 5 Support)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. ZIP Extract karna aur subfolders handle karna
      - name: Extract Project ZIP
        run: |
          unzip -q SongTube-App-7.3.2-5200.zip -d extracted_project
          if [ -f "extracted_project/pubspec.yaml" ]; then
            mv extracted_project/* . || true
            mv extracted_project/.* . || true
          else
            SUBFOLDER=$(find extracted_project -maxdepth 2 -name "pubspec.yaml" -exec dirname {} \;)
            if [ ! -z "$SUBFOLDER" ]; then
              mv $SUBFOLDER/* . || true
              mv $SUBFOLDER/.* . || true
            fi
          fi

      # 2. Gradle Path Error ko auto-fix karna (Line 62 temporary fix)
      - name: Fix Gradle Null Path Error
        run: |
          if [ -f "android/app/build.gradle" ]; then
            echo "Applying patch for Gradle null path error..."
            # build.gradle mein jahan properties load ho rahi hain, wahan fallback add karna
            sed -i 's/properties.getProperty([^)]*)/properties.getProperty(\0) ?: ""/g' android/app/build.gradle
            # Check properties file presence
            touch android/local.properties
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      # 3. Build flags ke saath run karna taaki features break na hon
      - name: Build APK
        run: flutter build apk --release --split-per-abi --no-shrink

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SongTube-Lollipop-APKs
          path: build/app/outputs/flutter-apk/*.apk
